<style>
        .pixel-border {
            box-shadow: 4px 4px 0px 0px #3d0024;
        }
        .pixel-inset {
            box-shadow: inset 4px 4px 0px 0px #827379;
        }
        .pixel-button-active:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px #3d0024;
        }
        .retro-grid {
            background-size: 32px 32px;
            background-image: linear-gradient(to right, #f3f3f4 1px, transparent 1px), linear-gradient(to bottom, #f3f3f4 1px, transparent 1px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 1.5em;
        }

<script>
        const GOOGLE_TRANSLATE_API_KEY = "";

        const languages = [
            ["auto", "Detect language"],
            ["af", "Afrikaans"], ["sq", "Albanian"], ["am", "Amharic"], ["ar", "Arabic"], ["hy", "Armenian"],
            ["as", "Assamese"], ["ay", "Aymara"], ["az", "Azerbaijani"], ["bm", "Bambara"], ["eu", "Basque"],
            ["be", "Belarusian"], ["bn", "Bengali"], ["bho", "Bhojpuri"], ["bs", "Bosnian"], ["bg", "Bulgarian"],
            ["ca", "Catalan"], ["ceb", "Cebuano"], ["zh-CN", "Chinese (Simplified)"], ["zh-TW", "Chinese (Traditional)"],
            ["co", "Corsican"], ["hr", "Croatian"], ["cs", "Czech"], ["da", "Danish"], ["dv", "Dhivehi"],
            ["doi", "Dogri"], ["nl", "Dutch"], ["en", "English"], ["eo", "Esperanto"], ["et", "Estonian"],
            ["ee", "Ewe"], ["fil", "Filipino"], ["fi", "Finnish"], ["fr", "French"], ["fy", "Frisian"],
            ["gl", "Galician"], ["ka", "Georgian"], ["de", "German"], ["el", "Greek"], ["gn", "Guarani"],
            ["gu", "Gujarati"], ["ht", "Haitian Creole"], ["ha", "Hausa"], ["haw", "Hawaiian"], ["he", "Hebrew"],
            ["hi", "Hindi"], ["hmn", "Hmong"], ["hu", "Hungarian"], ["is", "Icelandic"], ["ig", "Igbo"],
            ["ilo", "Ilocano"], ["id", "Indonesian"], ["ga", "Irish"], ["it", "Italian"], ["ja", "Japanese"],
            ["jv", "Javanese"], ["kn", "Kannada"], ["kk", "Kazakh"], ["km", "Khmer"], ["rw", "Kinyarwanda"],
            ["gom", "Konkani"], ["ko", "Korean"], ["kri", "Krio"], ["ku", "Kurdish (Kurmanji)"], ["ckb", "Kurdish (Sorani)"],
            ["ky", "Kyrgyz"], ["lo", "Lao"], ["la", "Latin"], ["lv", "Latvian"], ["ln", "Lingala"],
            ["lt", "Lithuanian"], ["lg", "Luganda"], ["lb", "Luxembourgish"], ["mk", "Macedonian"], ["mai", "Maithili"],
            ["mg", "Malagasy"], ["ms", "Malay"], ["ml", "Malayalam"], ["mt", "Maltese"], ["mi", "Maori"],
            ["mr", "Marathi"], ["mni-Mtei", "Meiteilon"], ["lus", "Mizo"], ["mn", "Mongolian"], ["my", "Myanmar"],
            ["ne", "Nepali"], ["no", "Norwegian"], ["ny", "Nyanja"], ["or", "Odia"], ["om", "Oromo"],
            ["ps", "Pashto"], ["fa", "Persian"], ["pl", "Polish"], ["pt", "Portuguese"], ["pa", "Punjabi"],
            ["qu", "Quechua"], ["ro", "Romanian"], ["ru", "Russian"], ["sm", "Samoan"], ["sa", "Sanskrit"],
            ["gd", "Scots Gaelic"], ["nso", "Sepedi"], ["sr", "Serbian"], ["st", "Sesotho"], ["sn", "Shona"],
            ["sd", "Sindhi"], ["si", "Sinhala"], ["sk", "Slovak"], ["sl", "Slovenian"], ["so", "Somali"],
            ["es", "Spanish"], ["su", "Sundanese"], ["sw", "Swahili"], ["sv", "Swedish"], ["tl", "Tagalog"],
            ["tg", "Tajik"], ["ta", "Tamil"], ["tt", "Tatar"], ["te", "Telugu"], ["th", "Thai"],
            ["ti", "Tigrinya"], ["ts", "Tsonga"], ["tr", "Turkish"], ["tk", "Turkmen"], ["ak", "Twi"],
            ["uk", "Ukrainian"], ["ur", "Urdu"], ["ug", "Uyghur"], ["uz", "Uzbek"], ["vi", "Vietnamese"],
            ["cy", "Welsh"], ["xh", "Xhosa"], ["yi", "Yiddish"], ["yo", "Yoruba"], ["zu", "Zulu"]
        ];

        const speechLangMap = {
            "zh-CN": "zh-CN",
            "zh-TW": "zh-TW",
            "pt": "pt-BR",
            "en": "en-US",
            "es": "es-ES",
            "fr": "fr-FR",
            "de": "de-DE",
            "hi": "hi-IN",
            "ta": "ta-IN",
            "ja": "ja-JP",
            "ko": "ko-KR",
            "ar": "ar-SA",
            "ru": "ru-RU"
        };

        let availableVoices = [];

        function googleCode(code) {
            if (code === "zh-CN") return "zh";
            return code;
        }

        function textToSpeechCode(code) {
            return speechLangMap[code] || code;
        }

        function loadVoices() {
            availableVoices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
        }

        function getBestVoice(languageCode) {
            const speechCode = textToSpeechCode(languageCode);
            const shortCode = speechCode.split("-")[0];

            return availableVoices.find((voice) => voice.lang === speechCode)
                || availableVoices.find((voice) => voice.lang.toLowerCase().startsWith(`${shortCode.toLowerCase()}-`))
                || availableVoices.find((voice) => voice.lang.toLowerCase() === shortCode.toLowerCase())
                || null;
        }

        function populateLanguages() {
            const sourceSelect = document.getElementById('sourceLang');
            const targetSelect = document.getElementById('targetLang');

            sourceSelect.innerHTML = languages
                .map(([code, name]) => `<option value="${code}">${name}</option>`)
                .join('');
            targetSelect.innerHTML = '<option value="">Select Language</option>' + languages
                .filter(([code]) => code !== "auto")
                .map(([code, name]) => `<option value="${code}">${name}</option>`)
                .join('');

            sourceSelect.value = "auto";
            targetSelect.value = "ta";
        }

        function cleanOutputText(text) {
            return text
                .replace(/&quot;/g, '"')
                .replace(/&#39;/g, "'")
                .replace(/&amp;/g, "&")
                .replace(/&lt;/g, "<")
                .replace(/&gt;/g, ">");
        }

        async function translateWithGooglePublic(inputText, sourceLang, targetLang) {
            const source = sourceLang === "auto" ? "auto" : googleCode(sourceLang);
            const target = googleCode(targetLang);
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${encodeURIComponent(source)}&tl=${encodeURIComponent(target)}&dt=t&q=${encodeURIComponent(inputText)}`;
            const response = await fetch(url);
            const data = await response.json();

            if (!response.ok || !Array.isArray(data[0])) {
                throw new Error("Google Translation Error");
            }

            return cleanOutputText(data[0].map((part) => part[0]).join(""));
        }

        async function translateWithGoogleOfficial(inputText, sourceLang, targetLang) {
            const body = {
                q: inputText,
                target: googleCode(targetLang),
                format: "text"
            };

            if (sourceLang !== "auto") {
                body.source = googleCode(sourceLang);
            }

            const response = await fetch(`https://translation.googleapis.com/language/translate/v2?key=${GOOGLE_TRANSLATE_API_KEY}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body)
            });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || "Google Translation Error");
            }

            return cleanOutputText(data.data.translations[0].translatedText);
        }

        async function translateWithFallback(inputText, sourceLang, targetLang) {
            const fallbackSource = sourceLang === "auto" ? "en" : sourceLang;
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(inputText)}&langpair=${encodeURIComponent(fallbackSource)}|${encodeURIComponent(targetLang)}`);
            const data = await response.json();

            if (data.responseData?.translatedText) {
                return cleanOutputText(data.responseData.translatedText);
            }

            throw new Error("Translation Error");
        }

        async function translateText() {
            const inputText = document.getElementById('inputText').value;
            const sourceLang = document.getElementById('sourceLang').value;
            const targetLang = document.getElementById('targetLang').value;
            const outputDiv = document.getElementById('output');

            if (!inputText.trim()) {
                alert("Please enter text to translate");
                return;
            }
            if (targetLang === "") {
                alert("Please select a target language");
                return;
            }

            outputDiv.innerText = 'Translating...';
            outputDiv.classList.add('opacity-50');

            try {
                outputDiv.innerText = GOOGLE_TRANSLATE_API_KEY
                    ? await translateWithGoogleOfficial(inputText, sourceLang, targetLang)
                    : await translateWithGooglePublic(inputText, sourceLang, targetLang);
            } catch (error) {
                try {
                    outputDiv.innerText = await translateWithFallback(inputText, sourceLang, targetLang);
                } catch {
                    outputDiv.innerText = error.message || 'Network Error';
                }
            } finally {
                outputDiv.classList.remove('opacity-50');
            }
        }

        function copyText() {
            const text = document.getElementById('output').innerText;
            if (text && text !== 'Translating...' && text !== 'Translated text will appear here...') {
                navigator.clipboard.writeText(text);
                alert('Copied to clipboard!');
            }
        }

        function swapLanguages() {
            const sourceSelect = document.getElementById('sourceLang');
            const targetSelect = document.getElementById('targetLang');
            const inputText = document.getElementById('inputText');
            const output = document.getElementById('output');

            if (sourceSelect.value === "auto" || !targetSelect.value) return;

            const oldSource = sourceSelect.value;
            sourceSelect.value = targetSelect.value;
            targetSelect.value = oldSource;

            if (output.innerText && output.innerText !== "Translated text will appear here..." && output.innerText !== "Translating...") {
                const oldInput = inputText.value;
                inputText.value = output.innerText;
                output.innerText = oldInput || "Translated text will appear here...";
            }
        }

        async function shareText() {
            const text = document.getElementById('output').innerText;

            if (!text || text === 'Translated text will appear here...' || text === 'Translating...') return;

            if (navigator.share) {
                await navigator.share({text});
            } else {
                await navigator.clipboard.writeText(text);
                alert('Translation copied for sharing!');
            }
        }

        function speakText(elementId, languageSelectId) {
            const text = document.getElementById(elementId).value || document.getElementById(elementId).innerText;
            const language = document.getElementById(languageSelectId).value;

            if (!text || text === 'Translated text will appear here...' || text === 'Translating...') return;

            loadVoices();
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (language && language !== "auto") {
                utterance.lang = textToSpeechCode(language);
                const voice = getBestVoice(language);

                if (voice) {
                    utterance.voice = voice;
                } else if (language === "hi") {
                    alert("Hindi voice is not installed in this browser/system. Try Chrome/Edge and install a Hindi voice in your OS speech settings.");
                }
            }
            window.speechSynthesis.speak(utterance);
        }

        function startVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                alert("Speech recognition is not supported in this browser. Try Chrome or Edge.");
                return;
            }

            const sourceLang = document.getElementById('sourceLang').value;
            const micButton = document.getElementById('micButton');
            const recognition = new SpeechRecognition();

            recognition.lang = sourceLang === "auto" ? "en-US" : textToSpeechCode(sourceLang);
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            micButton.classList.add("bg-primary-container");
            recognition.start();

            recognition.onresult = (event) => {
                document.getElementById('inputText').value = event.results[0][0].transcript;
            };

            recognition.onerror = () => {
                alert("Could not capture speech. Please check your microphone permission.");
            };

            recognition.onend = () => {
                micButton.classList.remove("bg-primary-container");
            };
        }

        window.addEventListener("DOMContentLoaded", () => {
            populateLanguages();
            loadVoices();
            if (window.speechSynthesis) {
                window.speechSynthesis.onvoiceschanged = loadVoices;
            }
        });
    </script>
</head>

</div>
